name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # --- Run tests first ---
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest -v --maxfail=1 --disable-warnings --cov=src --cov-report=xml

  # --- Build & Deploy only if tests pass ---
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test   # ensures deploy waits for tests to succeed

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1   # change to your region

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/streamiq-backend:latest -f Dockerfile .
          docker push ${{ steps.login-ecr.outputs.registry }}/streamiq-backend:latest

      - name: Build and push dashboard
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/streamiq-dashboard:latest -f Dockerfile .
          docker push ${{ steps.login-ecr.outputs.registry }}/streamiq-dashboard:latest

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ecs/task_definition.json
          service: streamiq-service
          cluster: streamiq-cluster
          wait-for-service-stability: true
