name: CI/CD Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1   # change to your AWS region

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build & push backend image
      - name: Build and push backend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/streamiq-backend:latest -f Dockerfile .
          docker push ${{ steps.login-ecr.outputs.registry }}/streamiq-backend:latest

      # 5. Build & push dashboard image
      - name: Build and push dashboard
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/streamiq-dashboard:latest -f Dockerfile .
          docker push ${{ steps.login-ecr.outputs.registry }}/streamiq-dashboard:latest

      # 6. Deploy to ECS
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ecs/task_definition.json
          service: streamiq-service
          cluster