[server]
# Run on a custom port to avoid conflicts
port = 8503

# Allow cross-origin requests (disable CORS)
enableCORS = false

# Disable XSRF protection so CORS can be disabled cleanly
enableXsrfProtection = false

# Automatically open the app in your default browser
headless = false

# Watch for file changes and auto-reload
fileWatcherType = "auto"

# --- Dark Theme (default demo mode) ---
[theme]
base = "dark"
primaryColor = "#4CAF50"             # StreamIQ green accent
backgroundColor = "#1E2228"          # lighter dark banner
secondaryBackgroundColor = "#262730" # dark panels
textColor = "#FAFAFA"                # light text for readability
font = "sans serif"

# --- Light Theme (stakeholder variant) ---
# To enable, change base = "light" above
# and adjust branding.py to sync logos/favicons
#[theme]
#base = "light"
#primaryColor = "#4CAF50"             # StreamIQ green accent
#backgroundColor = "#FFFFFF"          # clean white background
#secondaryBackgroundColor = "#F5F5F5" # subtle light gray panels
#textColor = "#212121"                # dark text for readability
#font = "sans serif"
