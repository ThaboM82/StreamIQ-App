version: "3.9"

services:
  backend:
    build: .
    container_name: streamiq-backend
    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - NLP_ENGINE=hf   # or spark, configurable
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=streamiq

  dashboard:
    build: .
    container_name: streamiq-dashboard
    command: streamlit run dashboards/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000

  db:
    image: mysql:8.0
    container_name: streamiq-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: streamiq
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:

    