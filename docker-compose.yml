version: "3.9"

services:
  streamiq:
    build: .
    container_name: streamiq_app
    restart: always
    ports:
      - "5000:5000"   # Flask API
      - "8501:8501"   # Streamlit dashboard
    environment:
      - NLP_ENGINE=huggingface   # switch to 'spark' for big data mode
      - DATABASE_URL=mysql://user:password@db/streamiq
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: streamiq_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: streamiq
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
